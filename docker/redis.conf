# ── XYZ Shope Redis Configuration ────────────────────────────────────────────
# Redis 7.2 — Production-ready configuration for the e-commerce backend

# ── Persistence: Hybrid RDB + AOF ────────────────────────────────────────────
# RDB snapshots for fast restart recovery
save 900 1
save 300 10
save 60 10000

# AOF for per-write durability (hybrid = RDB base + AOF delta)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec          # good balance: fsync every second
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-use-rdb-preamble yes      # hybrid persistence

# ── Memory and Eviction ───────────────────────────────────────────────────────
# Allow up to 512MB for cache data
maxmemory 512mb

# volatile-ttl: evict keys with a TTL, preferring those expiring soonest.
# Rationale: our cache keys have explicit TTLs; session/leaderboard keys we
# want to keep longer — volatile-ttl removes cache entries first without
# touching TTL-less critical data.
maxmemory-policy volatile-ttl

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Slow log ─────────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000  # log commands taking > 10ms
slowlog-max-len 128

# ── Keyspace notifications (for TTL expiry events) ────────────────────────────
notify-keyspace-events "Ex"
