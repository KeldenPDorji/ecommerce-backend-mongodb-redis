# ── XYZ Shope Redis Configuration ────────────────────────────────────────────
# Redis 7.2 — Production-ready configuration for the e-commerce backend

# ── Persistence: Hybrid RDB + AOF ────────────────────────────────────────────
# RDB snapshots for fast restart recovery
save 900 1
save 300 10
save 60 10000

# AOF for per-write durability (hybrid = RDB base + AOF delta)
appendonly yes
appendfilename "appendonly.aof"
# Good balance between durability and throughput.
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
# Hybrid persistence: RDB base followed by AOF delta.
aof-use-rdb-preamble yes

# ── Memory and Eviction ───────────────────────────────────────────────────────
# Allow up to 512MB for cache data
maxmemory 512mb

# volatile-ttl evicts expiring keys nearest to expiry first. Persistent
# leaderboard keys are protected; sessions remain reconstructable from login.
maxmemory-policy volatile-ttl

# ── Network ───────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Slow log ─────────────────────────────────────────────────────────────────
# Log commands taking more than 10 ms.
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── Keyspace notifications (for TTL expiry events) ────────────────────────────
notify-keyspace-events "Ex"
